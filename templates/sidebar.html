<aside class="sidebar" aria-label="Primary">
  <nav>
    <ul>
    {% for link in nav_links %}
      <li>
        <a href="{{ link.url }}" class="nav-icon {% if request.path == link.url %}active{% endif %}" title="{{ link.label }}">
          <span>{{ link.label[0] }}</span>
        </a>
      </li>
    {% endfor %}
    </ul>
  </nav>
</aside>
