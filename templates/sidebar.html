<aside id="primarySidebar" class="sidebar" aria-label="Primary">
  <button
    class="sidebar-toggle"
    id="sidebarToggle"
    type="button"
    aria-label="Collapse sidebar"
    aria-controls="primarySidebar"
    aria-expanded="true"
  >
    <span class="sidebar-toggle-icon" aria-hidden="true">⇤</span>
    <span class="sidebar-toggle-label">Collapse</span>
  </button>
  <nav>
    <p class="sidebar-heading">Navigation</p>
    <ul>
    {% for link in nav_links %}
      <li>
        <a href="{{ link.url }}" class="{% if request.path == link.url %}active{% endif %}">
          <span class="nav-icon" aria-hidden="true">{{ link.icon }}</span>
          <span class="nav-label">{{ link.label }}</span>
        </a>
      </li>
    {% endfor %}
    </ul>
  </nav>
</aside>
