<aside id="primarySidebar" class="sidebar" aria-label="Primary">
  <nav>
    <p class="sidebar-heading">Navigation</p>
    <ul>
    {% for link in nav_links %}
      <li>
        <a href="{{ link.url }}" class="{% if request.path == link.url %}active{% endif %}">{{ link.label }}</a>
      </li>
    {% endfor %}
    </ul>
  </nav>
</aside>
